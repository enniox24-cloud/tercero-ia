<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tercero OS | Mainframe Cognitivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #060913; --primary: #00f2fe; --neon-green: #39ff14; 
            --neon-orange: #ff9900; --text: #e0e6ed;
        }
        body { font-family: 'Share Tech Mono', monospace; background: var(--bg-main); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        /* Sidebar y Estructura */
        #sidebar { width: 260px; background: #0b1120; border-right: 1px solid #14223d; display: flex; flex-direction: column; padding: 20px; }
        #brand { font-family: 'Orbitron', sans-serif; color: var(--primary); text-align: center; margin-bottom: 30px; letter-spacing: 2px; text-shadow: 0 0 10px var(--primary); }
        
        /* HUD Central */
        #main-chat { flex: 1; display: flex; flex-direction: column; }
        #hud-top-bar { padding: 20px; display: flex; justify-content: center; border-bottom: 1px solid #14223d; }
        #hud-core { width: 60px; height: 60px; border: 2px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        
        /* Chat y Telemetría */
        #workspace { flex: 1; display: flex; overflow: hidden; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; }
        #hud-telemetry { width: 300px; background: #0b1120; padding: 20px; border-left: 1px solid #14223d; }
        
        /* Consola */
        #serial-console { height: 200px; background: #000; border: 1px solid var(--primary); color: var(--neon-green); padding: 10px; font-size: 12px; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="brand">TERCERO OS</div>
        <button onclick="iniciarNuevoChat()">+ NUEVO VECTOR</button>
        <div id="chats-list"></div>
    </div>
    
    <div id="main-chat">
        <div id="hud-top-bar"><div id="hud-core">SYS</div></div>
        <div id="workspace">
            <div id="chat-window"></div>
            <div id="hud-telemetry">
                <h3>TELEMETRÍA</h3>
                <div id="cpu-bar" style="background: var(--primary); height: 10px; width: 0%;"></div>
                <div id="serial-console">INICIALIZANDO...</div>
            </div>
        </div>
    </div>

    <script>
        // LÓGICA CORE (PENDIENTE DE CONEXIÓN)
        const APP_STATE = {
            usuario: "Ennio",
            estado: "IDLE"
        };

        function iniciarNuevoChat() { console.log("Iniciando nuevo proceso..."); }
        
        // ESTA ES LA ESTRUCTURA QUE MEJORAREMOS PARA TU IA
        function actualizarInterfaz() {
            // Aquí centralizaremos las actualizaciones de la pantalla
        }
    </script>
</body>
</html>
