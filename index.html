<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tercero OS | Control Central</title>
    <style>
        :root { --neon: #00f2fe; --bg: #060913; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #terminal { flex: 1; padding: 20px; overflow-y: auto; border-bottom: 1px solid var(--neon); }
        #controls { padding: 20px; display: flex; gap: 10px; background: #0b1120; }
        input { flex: 1; background: #000; border: 1px solid var(--neon); color: white; padding: 10px; }
        button { background: var(--neon); color: black; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <div id="controls">
        <button onclick="iniciarVoz()">🎤 ESCUCHAR</button>
        <input type="text" id="msg" placeholder="Comando...">
        <button onclick="ejecutar()">EJECUTAR</button>
    </div>
    <script>
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        function iniciarVoz() { recognition.start(); }
        recognition.onresult = (e) => {
            document.getElementById('msg').value = e.results[0][0].transcript;
            ejecutar();
        };

        async function ejecutar() {
            const msg = document.getElementById('msg').value;
            document.getElementById('terminal').innerHTML += `<p>> ${msg}</p>`;
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: "Ennio", message: msg})
            });
            const data = await res.json();
            document.getElementById('terminal').innerHTML += `<p style="color:#fff">[Tercero]: ${data.text}</p>`;
            if(data.audio_url) new Audio(data.audio_url).play();
            document.getElementById('msg').value = '';
        }
    </script>
</body>
</html>
