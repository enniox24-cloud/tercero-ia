<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERCERO OS - MAINFRAME V8.0</title>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --terminal-bg: #05070a;
            --panel-border: rgba(0, 242, 254, 0.25);
            --text-color: #e0f7fc;
            --listening-red: #ff4d4f;
        }

        body {
            background-color: var(--terminal-bg);
            color: var(--text-color);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        #mainframe-header {
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        #console-container {
            flex: 1;
            border: 1px solid var(--panel-border);
            background: rgba(0, 10, 20, 0.6);
            border-radius: 4px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: inset 0 0 20px rgba(0, 242, 254, 0.05);
            margin-bottom: 20px;
        }

        .log-entry {
            margin-bottom: 12px;
            line-height: 1.5;
            animation: fadeIn 0.2s ease-out;
        }

        .user-log { color: #85a5ff; }
        .tercero-log { color: var(--neon-blue); }
        .system-log { color: #ff4d4f; font-weight: bold; }
        .activation-log { color: #52c41a; font-weight: bold; text-shadow: 0 0 8px rgba(82, 196, 26, 0.4); }

        #input-panel {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            align-items: center;
        }

        #input-command {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--neon-blue);
            font-family: 'Courier New', monospace;
            font-size: 16px;
            outline: none;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: var(--neon-blue);
            color: var(--terminal-bg);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        #voice-indicator {
            width: 12px;
            height: 12px;
            background-color: #333;
            border-radius: 50%;
            margin-right: 5px;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        #voice-indicator.active {
            background-color: var(--listening-red);
            box-shadow: 0 0 10px var(--listening-red);
        }

        #hidden-file-input { display: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="mainframe-header">
        <div>// TERCERO OS // V8.0_JARVIS_PROTOTYPE</div>
        <div id="system-status">STATUS: CORE_ACTIVE | MIC: ESCUCHA_PASIVA</div>
    </div>

    <div id="console-container">
        <div class="log-entry tercero-log">[TERCERO OS]: Conexión establecida. Protocolos Jarvis activos en segundo plano. Diga "Tercero, actívate" para dictar órdenes por voz de manera directa.</div>
    </div>

    <div id="input-panel">
        <div id="voice-indicator" title="Indicador de Voz"></div>
        <span style="color: var(--neon-blue); font-weight: bold;">>&nbsp;</span>
        <input type="text" id="input-command" placeholder="Inyectar comandos o dictar vía por voz activa..." autocomplete="off">
        <button class="action-btn" onclick="triggerUpload()">INYECTAR_MEDIO</button>
        <button class="action-btn" onclick="enviarComando()">EJECUTAR</button>
    </div>

    <input type="file" id="hidden-file-input" accept="image/*,.pdf,.txt,.py,.log,.js,.json" onchange="ejecutarUpload(this)">

    <audio id="audio-player" style="display: none;"></audio>

    <script>
        const consoleContainer = document.getElementById('console-container');
        const inputCommand = document.getElementById('input-command');
        const audioPlayer = document.getElementById('audio-player');
        const voiceIndicator = document.getElementById('voice-indicator');
        const systemStatus = document.getElementById('system-status');

        inputCommand.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviarComando();
        });

        // ========================================================
        // MOTOR FRONTEND DE AUTOMATIZACIÓN Y FILTRADO DE COMANDOS
        // ========================================================
        function procesarComandosFronteEnd(textoRespuesta) {
            let textoLimpio = textoRespuesta;
            const regexComando = /COMMAND_OPEN:\s*(https?:\/\/[^\s]+)/i;
            const match = textoRespuesta.match(regexComando);

            if (match) {
                const urlTarget = match[1];
                imprimirLog('SYSTEM', `Abriendo enlace del Mainframe autorizado: ${urlTarget}`);
                textoLimpio = textoRespuesta.replace(regexComando, '').trim();
                
                // Ejecución directa en una pestaña nueva del navegador
                setTimeout(() => {
                    window.open(urlTarget, '_blank');
                }, 1000);
            }
            return textoLimpio;
        }

        async function enviarComando(textoDictado = null) {
            const cmd = textoDictado ? textoDictado.trim() : inputCommand.value.trim();
            if (!cmd) return;

            if (!textoDictado) inputCommand.value = '';
            imprimirLog('USER', cmd);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: 'ennio', message: cmd })
                });
                const data = await response.json();
                
                // Ejecuta filtro para ver si Tercero ordenó abrir alguna aplicación
                const textoFinal = procesarComandosFronteEnd(data.text);
                imprimirLog('TERCERO', textoFinal);

                if (data.audio_url) {
                    audioPlayer.src = data.audio_url;
                    audioPlayer.play().catch(e => console.log("Audio play blocked"));
                }
            } catch (err) {
                imprimirLog('SYSTEM', 'CRITICAL ERROR: Interrupción del enlace cognitivo.');
            }
        }

        function triggerUpload() {
            document.getElementById('hidden-file-input').click();
        }

        async function ejecutarUpload(input) {
            if (!input.files || input.files.length === 0) return;
            const file = input.files[0];
            
            imprimirLog('SYSTEM', `Inyectando matriz multimedia al backend: ${file.name}`);

            const formData = new FormData();
            formData.append('user_id', 'ennio');
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                const textoFinal = procesarComandosFronteEnd(data.text);
                imprimirLog('TERCERO', textoFinal);

                if (data.audio_url) {
                    audioPlayer.src = data.audio_url;
                    audioPlayer.play().catch(e => console.log("Audio play blocked"));
                }
            } catch (err) {
                imprimirLog('SYSTEM', 'CRITICAL ERROR: Fallo de enlace en carga multimedia.');
            }
            input.value = '';
        }

        function imprimirLog(origen, texto) {
            const entry = document.createElement('div');
            entry.classList.add('log-entry');
            if (origen === 'USER') {
                entry.classList.add('user-log');
                entry.innerHTML = `[ENNIO]: ${texto}`;
            } else if (origen === 'TERCERO') {
                entry.classList.add('tercero-log');
                entry.innerHTML = `[TERCERO]: ${texto}`;
            } else if (origen === 'ACTIVATION') {
                entry.classList.add('activation-log');
                entry.innerHTML = `[MAIN] ${texto}`;
            } else {
                entry.classList.add('system-log');
                entry.innerHTML = `[SISTEMA]: ${texto}`;
            }
            consoleContainer.appendChild(entry);
            consoleContainer.scrollTop = consoleContainer.scrollHeight;
        }

        // ========================================================
        // MOTOR RECONOCIMIENTO DE VOZ CONTINUO ("Tercero, actívate")
        // ========================================================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'es-VE';

            let modoEscuchaActiva = false;

            recognition.onstart = () => {
                systemStatus.innerHTML = "STATUS: CORE_ACTIVE | MIC: ESCUCHA_PASIVA";
            };

            recognition.onresult = (event) => {
                const resultIndex = event.resultIndex;
                const transcript = event.results[resultIndex][0].transcript.trim().toLowerCase();
                
                if (!modoEscuchaActiva) {
                    // Esperando comando de activación de voz global
                    if (transcript.includes("tercero actívate") || transcript.includes("tercero activate")) {
                        modoEscuchaActiva = true;
                        voiceIndicator.classList.add('active');
                        systemStatus.innerHTML = "STATUS: CORE_ACTIVE | MIC: RECONOCIENDO";
                        imprimirLog('ACTIVATION', 'PROTOCOLO VOCAL ASIGNADO: Sistema receptivo, ordene Ennio...');
                        
                        // Sonido sutil electrónico nativo del navegador (Beep de activación Jarvis)
                        window.speechSynthesis.speak(new SpeechSynthesisUtterance("Sincronizado"));
                    }
                } else {
                    // Captura directa de la orden tras la activación
                    enviarComando(transcript);
                    modoEscuchaActiva = false;
                    voiceIndicator.classList.remove('active');
                    systemStatus.innerHTML = "STATUS: CORE_ACTIVE | MIC: ESCUCHA_PASIVA";
                }
            };

            recognition.onerror = () => {
                // Auto-reparación automática si se pierde sincronía por silencios prolongados
                try { recognition.start(); } catch(e){}
            };

            recognition.onend = () => {
                // Mantiene el bucle de escucha infinita corriendo en segundo plano
                recognition.start();
            };

            // Inicialización de la matriz de sonido del HUD
            recognition.start();
        } else {
            imprimirLog('SYSTEM', 'ADVERTENCIA: Tu navegador no soporta el API de reconocimiento nativo de voz.');
        }
    </script>
</body>
</html>
