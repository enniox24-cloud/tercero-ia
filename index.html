<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="hud-container">
        <h1>TERCERO OS - V6.0</h1>
        <div id="output"></div>
        <input type="text" id="comando" placeholder="> Inyectar comando...">
        <button onclick="enviarComando()">EJECUTAR</button>
    </div>

    <script>
        async function enviarComando() {
            const msg = document.getElementById('comando').value;
            const output = document.getElementById('output');
            output.innerHTML += `<p>> ${msg}</p>`;
            
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: "Ennio", message: msg})
            });
            const data = await res.json();
            output.innerHTML += `<p>Tercero: ${data.text}</p>`;
        }
    </script>
</body>
</html>
