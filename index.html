<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TERCERO OS | MAINFRAME</title>
    <style>
        body { background: #050505; color: #00f2fe; font-family: 'Segoe UI', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        #core-visualizer { width: 200px; height: 200px; border: 4px solid #00f2fe; border-radius: 50%; margin: 50px; box-shadow: 0 0 30px #00f2fe; transition: 0.5s; }
        .pulsing { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 20px #00f2fe; } 50% { transform: scale(1.1); box-shadow: 0 0 50px #00f2fe; } 100% { transform: scale(1); box-shadow: 0 0 20px #00f2fe; } }
        #terminal { width: 80%; height: 200px; border: 1px solid #14223d; padding: 20px; overflow-y: auto; background: rgba(0,20,30,0.5); }
        .controls { display: flex; gap: 20px; margin-top: 20px; }
        button { background: transparent; border: 1px solid #00f2fe; color: #00f2fe; padding: 15px 30px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #00f2fe; color: #000; }
    </style>
</head>
<body>
    <div id="core-visualizer"></div>
    <div id="terminal">--- NÚCLEO TERCERO ACTIVADO ---</div>
    <div class="controls">
        <button onclick="activarMicro()">🎤 MIC</button>
        <button onclick="document.getElementById('fileInput').click()">📁 SUBIR ARCHIVO</button>
        <input type="file" id="fileInput" hidden onchange="subirArchivo()">
    </div>
    <input type="text" id="msg" style="width: 50%; margin-top: 20px; padding: 10px; background: #000; border: 1px solid #00f2fe; color: #fff;" placeholder="Comando...">
    <button onclick="ejecutar()">EJECUTAR</button>

    <script>
        const core = document.getElementById('core-visualizer');
        const terminal = document.getElementById('terminal');

        async function ejecutar() {
            const m = document.getElementById('msg').value;
            terminal.innerHTML += `<p>> ${m}</p>`;
            const res = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: "Ennio", message: m}) });
            const data = await res.json();
            terminal.innerHTML += `<p style="color:#fff">[TERCERO]: ${data.text}</p>`;
            
            if(data.audio_url) {
                core.classList.add('pulsing');
                const audio = new Audio(data.audio_url);
                audio.onended = () => core.classList.remove('pulsing');
                audio.play();
            }
        }
        // ... (añadir lógica de micrófono y subirArchivo igual que antes)
    </script>
</body>
</html>
