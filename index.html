<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TERCERO OS | MAINFRAME</title>
    <style>
        body { background: #000; color: #00f2fe; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #hud { display: flex; flex-direction: column; height: 100vh; padding: 20px; border: 2px solid #00f2fe; box-shadow: inset 0 0 20px #00f2fe; }
        #terminal { flex: 1; overflow-y: auto; font-size: 1.2rem; margin-bottom: 20px; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #00f2fe; color: #fff; padding: 15px; }
        button { background: #00f2fe; color: #000; font-weight: bold; padding: 10px 20px; cursor: pointer; border: none; }
        .status-bar { border-top: 1px solid #00f2fe; padding-top: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="hud">
        <div id="terminal">--- SISTEMA TERCERO OS INICIADO ---<br></div>
        <div class="input-area">
            <button onclick="iniciarSistema()">ACTIVAR AUDIO</button>
            <input type="text" id="msg" placeholder="Ingresar comando...">
            <button onclick="ejecutar()">EJECUTAR</button>
        </div>
        <div class="status-bar">STATUS: V3.0 | MODO JARVIS ACTIVO | CPU: 12%</div>
    </div>
    <script>
        let audioContext;
        function iniciarSistema() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('terminal').innerHTML += "<p>> Audio desbloqueado.</p>";
        }
        async function ejecutar() {
            const m = document.getElementById('msg').value;
            document.getElementById('terminal').innerHTML += `<p style="color:#00f2fe">> ${m}</p>`;
            const res = await fetch('/chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: "Ennio", message: m}) });
            const data = await res.json();
            document.getElementById('terminal').innerHTML += `<p style="color:#fff">[TERCERO]: ${data.text}</p>`;
            if(data.audio_url) new Audio(data.audio_url).play();
            document.getElementById('msg').value = '';
        }
    </script>
</body>
</html>
