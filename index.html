<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERCERO OS - MAINFRAME V8.8</title>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --terminal-bg: #030508;
            --panel-border: rgba(0, 242, 254, 0.3);
            --text-color: #e0f7fc;
            --listening-red: #ff4d4f;
            --matrix-glow: rgba(0, 242, 254, 0.15);
        }

        body {
            background-color: var(--terminal-bg);
            color: var(--text-color);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        /* Fondo Dinámico Estilo Interfaz de Defensa */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 30, 49, 0.1) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 6px 100%;
            z-index: -1;
            pointer-events: none;
        }

        #mainframe-header {
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-shadow: 0 0 15px var(--neon-blue);
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Contenedor Holográfico de Consola */
        #console-container {
            flex: 1;
            border: 1px solid var(--panel-border);
            background: rgba(4, 12, 24, 0.75);
            border-radius: 6px;
            padding: 25px;
            overflow-y: auto;
            box-shadow: inset 0 0 30px rgba(0, 242, 254, 0.1), 0 0 20px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
            backdrop-filter: blur(4px);
        }

        .log-entry {
            margin-bottom: 14px;
            line-height: 1.6;
            animation: fadeIn 0.25s ease-out;
            font-size: 15px;
        }

        .user-log { color: #85a5ff; text-shadow: 0 0 5px rgba(133, 165, 255, 0.3); }
        .tercero-log { color: var(--neon-blue); text-shadow: 0 0 8px rgba(0, 242, 254, 0.4); }
        .system-log { color: var(--listening-red); font-weight: bold; text-shadow: 0 0 10px var(--listening-red); }
        .activation-log { color: #52c41a; font-weight: bold; text-shadow: 0 0 12px rgba(82, 196, 26, 0.6); }

        /* Panel de Control Inferior Estilizado */
        #input-panel {
            display: flex;
            gap: 12px;
            background: rgba(2, 6, 12, 0.9);
            padding: 12px 20px;
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            align-items: center;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.05);
        }

        #input-command {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--neon-blue);
            font-family: 'Courier New', monospace;
            font-size: 16px;
            outline: none;
            letter-spacing: 1px;
        }

        #input-command::placeholder {
            color: rgba(0, 242, 254, 0.4);
        }

        .action-btn {
            background: rgba(0, 242, 254, 0.03);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 24px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.25s ease-in-out;
            border-radius: 4px;
        }

        .action-btn:hover {
            background: var(--neon-blue);
            color: var(--terminal-bg);
            box-shadow: 0 0 20px var(--neon-blue);
            transform: translateY(-1px);
        }

        /* Núcleo de Energía Visual (Indicador de Estado de Voz) */
        #voice-indicator {
            width: 14px;
            height: 14px;
            background-color: rgba(0, 242, 254, 0.2);
            border: 1px solid var(--neon-blue);
            border-radius: 50%;
            margin-right: 8px;
            transition: all 0.4s ease;
            box-shadow: 0 0 5px rgba(0, 242, 254, 0.2);
        }

        #voice-indicator.active {
            background-color: var(--listening-red);
            border-color: var(--listening-red);
            box-shadow: 0 0 15px var(--listening-red), inset 0 0 5px #fff;
            animation: pulse 1s infinite alternate;
        }

        #hidden-file-input { display: none; }

        /* Animaciones del Sistema */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.2); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="mainframe-header">
        <div>// TERCERO OS // V8.8_JARVIS_HUD</div>
        <div id="system-status">STATUS: CORE_ACTIVE | MIC: ESCUCHA_PASIVA</div>
    </div>

    <div id="console-container">
        <div class="log-entry tercero-log">[TERCERO OS]: Núcleo cuántico estabilizado en producción. Protocolos Jarvis operativos. El canal de escucha pasiva está abierto en segundo plano. Diga "Tercero, actívate" para iniciar transmisión directa.</div>
    </div>

    <div id="input-panel">
        <div id="voice-indicator" title="Núcleo de Voz Pasiva"></div>
        <span style="color: var(--neon-blue); font-weight: bold;">>&nbsp;</span>
        <input type="text" id="input-command" placeholder="Inyectar secuencia de comandos o dictar vía voz activa..." autocomplete="off">
        <button class="action-btn" onclick="triggerUpload()">INYECTAR_MEDIO</button>
        <button class="action-btn" onclick="enviarComando()">EJECUTAR</button>
    </div>

    <input type="file" id="hidden-file-input" accept="image/*,.pdf,.txt,.py,.log,.js,.json" onchange="ejecutarUpload(this)">

    <audio id="audio-player" style="display: none;"></audio>

    <script>
        const consoleContainer = document.getElementById('console-container');
        const inputCommand = document.getElementById('input-command');
        const audioPlayer = document.getElementById('audio-player');
        const voiceIndicator = document.getElementById('voice-indicator');
        const systemStatus = document.getElementById('system-status');

        inputCommand.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviarComando();
        });

        // ========================================================
        // INTERCEPTOR DE AUTOMATIZACIÓN DE APLICACIONES (JARVIS MODE)
        // ========================================================
        function procesarComandosFronteEnd(textoRespuesta) {
            let textoLimpio = textoRespuesta;
            const regexComando = /COMMAND_OPEN:\s*(https?:\/\/[^\s]+)/i;
            const match = textoRespuesta.match(regexComando);

            if (match) {
                const urlTarget = match[1];
                imprimirLog('SYSTEM', `AUTORIZACIÓN DIRECTA: Ejecutando apertura automatizada de entorno en: ${urlTarget}`);
                textoLimpio = textoRespuesta.replace(regexComando, '').trim();
                
                setTimeout(() => {
                    window.open(urlTarget, '_blank');
                }, 800);
            }
            return textoLimpio;
        }

        // ========================================================
        // ENVÍO DE COMANDOS CON DETENCIÓN ASÍNCRONA DE AUDIO
        // ========================================================
        async function enviarComando(textoDictado = null) {
            const cmd = textoDictado ? textoDictado.trim() : inputCommand.value.trim();
            if (!cmd) return;

            // PARADA DE EMERGENCIA ASÍNCRONA: Interrupción forzada si el sistema está hablando
            if (!audioPlayer.paused) {
                audioPlayer.pause();
                audioPlayer.currentTime = 0;
                console.log("[NÚCLEO]: Transmisión de audio previa interrumpida por comando del operador.");
            }
            // Cancelar cualquier síntesis de voz nativa del navegador en cola
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            if (!textoDictado) inputCommand.value = '';
            imprimirLog('USER', cmd);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: 'ennio', message: cmd })
                });
                const data = await response.json();
                
                const textoFinal = procesarComandosFronteEnd(data.text);
                imprimirLog('TERCERO', textoFinal);

                if (data.audio_url) {
                    audioPlayer.src = data.audio_url;
                    audioPlayer.play().catch(e => console.log("Audio play deferred"));
                }
            } catch (err) {
                imprimirLog('SYSTEM', 'CRITICAL ERROR: Enlace cognitivo con el servidor interrumpido.');
            }
        }

        function triggerUpload() {
            document.getElementById('hidden-file-input').click();
        }

        async function ejecutarUpload(input) {
            if (!input.files || input.files.length === 0) return;
            const file = input.files[0];
            
            imprimirLog('SYSTEM', `Iniciando transferencia multimedia al Mainframe: ${file.name}`);

            const formData = new FormData();
            formData.append('user_id', 'ennio');
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                const textoFinal = procesarComandosFronteEnd(data.text);
                imprimirLog('TERCERO', textoFinal);

                if (data.audio_url) {
                    audioPlayer.src = data.audio_url;
                    audioPlayer.play().catch(e => console.log("Audio play deferred"));
                }
            } catch (err) {
                imprimirLog('SYSTEM', 'CRITICAL ERROR: Fallo de inyección en la matriz multimedia.');
            }
            input.value = '';
        }

        function imprimirLog(origen, texto) {
            const entry = document.createElement('div');
            entry.classList.add('log-entry');
            if (origen === 'USER') {
                entry.classList.add('user-log');
                entry.innerHTML = `[ENNIO]: ${texto}`;
            } else if (origen === 'TERCERO') {
                entry.classList.add('tercero-log');
                entry.innerHTML = `[TERCERO]: ${texto}`;
            } else if (origen === 'ACTIVATION') {
                entry.classList.add('activation-log');
                entry.innerHTML = `[NÚCLEO] ${texto}`;
            } else {
                entry.classList.add('system-log');
                entry.innerHTML = `[SISTEMA]: ${texto}`;
            }
            consoleContainer.appendChild(entry);
            consoleContainer.scrollTop = consoleContainer.scrollHeight;
        }

        // ========================================================
        // ESCUCHA CONTINUA INTELIGENTE CON CONTROL DE INTERRUPCIÓN
        // ========================================================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'es-VE';

            let modoEscuchaActiva = false;

            recognition.onstart = () => {
                systemStatus.innerHTML = "STATUS: CORE_ACTIVE | MIC: ESCUCHA_PASIVA";
            };

            recognition.onresult = (event) => {
                const resultIndex = event.resultIndex;
                const transcript = event.results[resultIndex][0].transcript.trim().toLowerCase();
                
                if (!modoEscuchaActiva) {
                    if (transcript.includes("tercero actívate") || transcript.includes("tercero activate")) {
                        
                        // INTERRUPCIÓN POR VOZ PASIVA: Silenciamos de inmediato cualquier respuesta previa en curso
                        if (!audioPlayer.paused) {
                            audioPlayer.pause();
                            audioPlayer.currentTime = 0;
                        }
                        if (window.speechSynthesis.speaking) {
                            window.speechSynthesis.cancel();
                        }

                        modoEscuchaActiva = true;
                        voiceIndicator.classList.add('active');
                        systemStatus.innerHTML = "STATUS: CORE_ACTIVE | MIC: TRANSMITIENDO";
                        imprimirLog('ACTIVATION', 'MATRIZ VOCAL SINCRONIZADA: Procesando órdenes del Operador...');
                        
                        const alerta = new SpeechSynthesisUtterance("Sincronizado, Ennio");
                        alerta.rate = 1.1;
                        window.speechSynthesis.speak(alerta);
                    }
                } else {
                    enviarComando(transcript);
                    modoEscuchaActiva = false;
                    voiceIndicator.classList.remove('active');
                    systemStatus.innerHTML = "STATUS: CORE_ACTIVE | MIC: ESCUCHA_PASIVA";
                }
            };

            recognition.onerror = () => {
                try { recognition.start(); } catch(e){}
            };

            recognition.onend = () => {
                recognition.start();
            };

            recognition.start();
        } else {
            imprimirLog('SYSTEM', 'ADVERTENCIA: Interfaz de voz no soportada por el navegador actual.');
        }
    </script>
</body>
</html>
