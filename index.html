<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERCERO OS - MAINFRAME</title>
    <style>
        :root {
            --neon-blue: #00f2fe;
            --terminal-bg: #05070a;
            --panel-border: rgba(0, 242, 254, 0.25);
            --text-color: #e0f7fc;
        }

        body {
            background-color: var(--terminal-bg);
            color: var(--text-color);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        #mainframe-header {
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        #console-container {
            flex: 1;
            border: 1px solid var(--panel-border);
            background: rgba(0, 10, 20, 0.6);
            border-radius: 4px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: inset 0 0 20px rgba(0, 242, 254, 0.05);
            margin-bottom: 20px;
        }

        .log-entry {
            margin-bottom: 12px;
            line-height: 1.5;
            animation: fadeIn 0.2s ease-out;
        }

        .user-log { color: #85a5ff; }
        .tercero-log { color: var(--neon-blue); }
        .system-log { color: #ff4d4f; font-weight: bold; }

        #input-panel {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border: 1px solid var(--panel-border);
            border-radius: 4px;
        }

        #input-command {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--neon-blue);
            font-family: 'Courier New', monospace;
            font-size: 16px;
            outline: none;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: var(--neon-blue);
            color: var(--terminal-bg);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        #hidden-file-input { display: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="mainframe-header">
        <div>// TERCERO OS // V7.0_EVOLUTION</div>
        <div id="system-status">STATUS: CORE_ACTIVE</div>
    </div>

    <div id="console-container">
        <div class="log-entry tercero-log">[TERCERO OS]: Conexión con la matriz cuántica establecida. Esperando comandos del Operador Ennio...</div>
    </div>

    <div id="input-panel">
        <span style="color: var(--neon-blue); font-weight: bold;">>&nbsp;</span>
        <input type="text" id="input-command" placeholder="Inyectar secuencia de comandos o análisis técnico..." autocomplete="off">
        <button class="action-btn" onclick="triggerUpload()">INYECTAR_ARCHIVO</button>
        <button class="action-btn" onclick="enviarComando()">EJECUTAR</button>
    </div>

    <input type="file" id="hidden-file-input" onchange="ejecutarUpload(this)">

    <audio id="audio-player" style="display: none;"></audio>

    <script>
        const consoleContainer = document.getElementById('console-container');
        const inputCommand = document.getElementById('input-command');
        const audioPlayer = document.getElementById('audio-player');

        inputCommand.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviarComando();
        });

        async function enviarComando() {
            const cmd = inputCommand.value.trim();
            if (!cmd) return;

            inputCommand.value = '';
            imprimirLog('USER', cmd);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: 'ennio', message: cmd })
                });
                const data = await response.json();
                
                imprimirLog('TERCERO', data.text);

                if (data.audio_url) {
                    audioPlayer.src = data.audio_url;
                    audioPlayer.play().catch(e => console.log("Audio play blocked/failed"));
                }
            } catch (err) {
                imprimirLog('SYSTEM', 'CRITICAL ERROR: Fallo de enlace con el núcleo cognitivo.');
            }
        }

        function triggerUpload() {
            document.getElementById('hidden-file-input').click();
        }

        async function ejecutarUpload(input) {
            if (!input.files || input.files.length === 0) return;
            const file = input.files[0];
            
            imprimirLog('SYSTEM', `Iniciando inyección de matriz de datos: ${file.name}`);

            const formData = new FormData();
            formData.append('user_id', 'ennio');
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                imprimirLog('TERCERO', data.text);

                if (data.audio_url) {
                    audioPlayer.src = data.audio_url;
                    audioPlayer.play().catch(e => console.log("Audio play blocked/failed"));
                }
            } catch (err) {
                imprimirLog('SYSTEM', 'CRITICAL ERROR: Transferencia de archivos interrumpida.');
            }
            input.value = ''; // Reset input
        }

        function imprimirLog(origen, texto) {
            const entry = document.createElement('div');
            entry.classList.add('log-entry');
            if (origen === 'USER') {
                entry.classList.add('user-log');
                entry.innerHTML = `[ENNIO]: ${texto}`;
            } else if (origen === 'TERCERO') {
                entry.classList.add('tercero-log');
                entry.innerHTML = `[TERCERO]: ${texto}`;
            } else {
                entry.classList.add('system-log');
                entry.innerHTML = `[SISTEMA]: ${texto}`;
            }
            consoleContainer.appendChild(entry);
            consoleContainer.scrollTop = consoleContainer.scrollHeight;
        }
    </script>
</body>
</html>
