<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERCERO OS | MAINFRAME V3.0</title>
    <!-- Cargamos Chart.js para el Osciloscopio de Telemetría -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --neon-cyan: #00f2fe;
            --neon-glow: rgba(0, 242, 254, 0.25);
            --dark-space: #03060f;
            --panel-bg: rgba(6, 13, 26, 0.7);
            --terminal-code: #102a45;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--dark-space);
            color: var(--neon-cyan);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #mainframe-container {
            display: flex;
            width: 100%;
            height: 100%;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-glow), inset 0 0 20px var(--neon-glow);
            margin: 10px;
            background: linear-gradient(180deg, var(--dark-space) 0%, #051026 100%);
        }

        /* Panel Izquierdo: Telemetría y Núcleo */
        #telemetry-panel {
            width: 350px;
            border-right: 2px solid var(--neon-cyan);
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            justify-content: space-between;
            transition: all 0.3s ease;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-align: center;
            border-bottom: 1px solid var(--neon-cyan);
            width: 100%;
            padding-bottom: 10px;
            text-shadow: 0 0 8px var(--neon-cyan);
            margin-bottom: 10px;
        }

        /* Núcleo Central de Animación - Estilo Jarvis */
        #arc-reactor {
            width: 150px;
            height: 150px;
            border: 6px double var(--neon-cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 15px var(--neon-cyan);
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        #arc-reactor::before {
            content: '';
            position: absolute;
            width: 110px;
            height: 110px;
            border: 2px dashed var(--neon-cyan);
            border-radius: 50%;
            animation: rotateCore 12s linear infinite;
        }

        #inner-core {
            width: 55px;
            height: 55px;
            background-color: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 25px var(--neon-cyan);
            transition: transform 0.2s ease;
        }

        /* Animación Activa de Voz */
        .core-speaking {
            animation: corePulse 1.2s ease-in-out infinite alternate !important;
        }

        .core-listening {
            border-color: #ff0055 !important;
            box-shadow: 0 0 25px #ff0055 !important;
        }
        .core-listening #inner-core {
            background-color: #ff0055 !important;
            box-shadow: 0 0 30px #ff0055 !important;
        }

        /* BARRAS DE TELEMETRÍA DE NEÓN */
        .telemetry-bar-container {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 242, 254, 0.3);
            height: 12px;
            margin: 5px 0 12px 0;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .telemetry-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--neon-cyan);
            box-shadow: 0 0 8px var(--neon-cyan);
            transition: width 0.5s ease, background-color 0.5s ease;
        }

        /* Contenedor del Osciloscopio */
        #oscillo-container {
            width: 100%;
            height: 110px;
            margin-top: 10px;
            background: rgba(0, 5, 15, 0.6);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 4px;
            padding: 5px;
        }

        /* Panel Derecho: Consola y Terminal */
        #console-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background: rgba(2, 4, 10, 0.85);
            overflow: hidden;
        }

        #terminal-display {
            flex: 1;
            border: 1px solid rgba(0, 242, 254, 0.3);
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.9);
        }

        .log-entry { margin: 10px 0; line-height: 1.4; font-size: 1rem; }
        .user-cmd { color: #ffffff; font-weight: bold; }
        .tercero-resp { color: var(--neon-cyan); text-shadow: 0 0 3px var(--neon-glow); }
        .system-alert { color: #ffaa00; font-size: 0.85rem; }

        /* Estilos Cyberpunk para Bloques de Código de Programación/Mecánica */
        .code-block-hud {
            background-color: var(--terminal-code);
            border-left: 3px solid var(--neon-cyan);
            padding: 12px;
            margin: 10px 0;
            font-family: 'Consolas', monospace;
            color: #d2f5ff;
            font-size: 0.9rem;
            overflow-x: auto;
            white-space: pre-wrap;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* Controles de Entrada */
        #interaction-deck {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .hud-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 14px 22px;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 0 5px rgba(0, 242, 254, 0.1);
            white-space: nowrap;
        }

        .hud-btn:hover {
            background: var(--neon-cyan);
            color: var(--dark-space);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        #mic-btn.active-mic {
            border-color: #ff0055;
            color: #ff0055;
            animation: alertBlink 1s infinite alternate;
        }

        #command-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(0, 242, 254, 0.5);
            color: #ffffff;
            padding: 14px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.5);
        }

        #command-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-glow), inset 0 0 5px rgba(0, 242, 254, 0.2);
        }

        /* Keyframes */
        @keyframes rotateCore {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes corePulse {
            0% { transform: scale(1); box-shadow: 0 0 15px var(--neon-cyan); }
            100% { transform: scale(1.15); box-shadow: 0 0 35px var(--neon-cyan); border-color: #ffffff; }
        }

        @keyframes alertBlink {
            0% { box-shadow: 0 0 5px rgba(255, 0, 85, 0.2); }
            100% { box-shadow: 0 0 20px rgba(255, 0, 85, 0.6); background: rgba(255, 0, 85, 0.1); }
        }

        @media (max-width: 1024px) {
            #mainframe-container { flex-direction: column; margin: 5px; }
            #telemetry-panel {
                width: 100%; height: auto; border-right: none;
                border-bottom: 2px solid var(--neon-cyan); padding: 15px;
                flex-direction: row; gap: 15px;
            }
            #arc-reactor { width: 100px; height: 100px; }
            #arc-reactor::before { width: 70px; height: 70px; }
            #inner-core { width: 40px; height: 40px; }
            #oscillo-container { display: none; }
            #telemetry-panel > div:last-child {
                flex: 1; display: flex; flex-direction: column; justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div id="mainframe-container">
        <div id="telemetry-panel">
            <div class="panel-title">NÚCLEO COGNITIVO</div>
            
            <div id="arc-reactor">
                <div id="inner-core"></div>
            </div>
            
            <div style="width: 100%;">
                <button class="hud-btn" style="width: 100%; margin-bottom: 12px;" onclick="sincronizarCanalAudio()">AUTORIZAR AUDIO</button>
                
                <div id="hud-telemetry-display" style="font-size: 0.75rem; color: rgba(0, 242, 254, 0.8); line-height: 1.4; font-family: monospace;">
                    CHRONO: <span id="telemetry-clock">00:00:00</span><br>
                    
                    BATTERY: <span id="telemetry-battery">SCANNING...</span>
                    <div class="telemetry-bar-container">
                        <div id="bar-battery" class="telemetry-bar-fill"></div>
                    </div>
                    
                    NET LATENCY: <span id="telemetry-ping">0 ms</span>
                    <div class="telemetry-bar-container">
                        <div id="bar-ping" class="telemetry-bar-fill"></div>
                    </div>
                    
                    MATRIX HOST: RENDER CLOUD V3
                </div>

                <!-- Gráfico de Telemetría Tipo Osciloscopio -->
                <div id="oscillo-container">
                    <canvas id="oscillo-canvas"></canvas>
                </div>
            </div>
        </div>

        <div id="console-panel">
            <div class="panel-title" style="text-align: left; margin-bottom: 15px;">TERCERO OS ONLINE v3.0 // MAINFRAME HUD</div>
            
            <div id="terminal-display">
                <div class="log-entry system-alert">> [SISTEMA]: Enlace inicializado. Presione 'AUTORIZAR AUDIO' antes de emitir transmisiones operativas.</div>
            </div>

            <div id="interaction-deck">
                <button id="mic-btn" class="hud-btn" onclick="conmutarMicrofono()">🎤 VOCAL</button>
                
                <input type="file" id="matrix-file-loader" style="display: none;" onchange="procesarCargaArchivo()">
                <button class="hud-btn" onclick="document.getElementById('matrix-file-loader').click()">📁 MATRIZ</button>
                
                <input type="text" id="command-input" placeholder="Escriba un comando para el sistema o hable..." onkeypress="evaluarRetorno(event)">
                <button class="hud-btn" onclick="enviarMensajeConsola()">EJECUTAR</button>
            </div>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal-display');
        const reactor = document.getElementById('arc-reactor');
        const micBtn = document.getElementById('mic-btn');
        const cmdInput = document.getElementById('command-input');
        
        let reconocimientoVoz;
        let controlVozActivo = false;
        let oscilloChart;

        // --- RECONOCIMIENTO VOCAL Y ESCUCHA CONTINUA ---
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechEngine = window.SpeechRecognition || window.webkitSpeechRecognition;
            reconocimientoVoz = new SpeechEngine();
            reconocimientoVoz.continuous = false;
            reconocimientoVoz.interimResults = false;
            reconocimientoVoz.lang = 'es-VE';

            reconocimientoVoz.onstart = () => {
                reactor.classList.add('core-listening');
                micBtn.classList.add('active-mic');
                logSistema("Captura vocal activa... Transmitiendo.");
            };

            reconocimientoVoz.onerror = (e) => {
                if(e.error !== 'no-speech') {
                    logSistema("Fallo en enlace vocal: " + e.error);
                }
            };

            reconocimientoVoz.onend = () => { 
                desactivarEstadoMic();
                // BUCLE MANOS LIBRES: Si sigue activo el flag, re-encendemos el micro automáticamente
                if (controlVozActivo) {
                    setTimeout(encenderCapturaVocal, 400);
                }
            };

            reconocimientoVoz.onresult = (e) => {
                const resultadoText = e.results[0][0].transcript;
                cmdInput.value = resultadoText;
                enviarMensajeConsola();
            };
        } else {
            logSistema("ADVERTENCIA: Captura de micro nativo no soportada.");
        }

        function conmutarMicrofono() {
            if (!reconocimientoVoz) return;
            if (controlVozActivo) {
                controlVozActivo = false;
                reconocimientoVoz.stop();
                desactivarEstadoMic();
                logSistema("Modo manos libres desactivado.");
            } else {
                controlVozActivo = true;
                encenderCapturaVocal();
            }
        }

        function encenderCapturaVocal() {
            if (!reconocimientoVoz || !controlVozActivo) return;
            try { reconocimientoVoz.start(); } catch(err) {}
        }

        function desactivarEstadoMic() {
            reactor.classList.remove('core-listening');
            micBtn.classList.remove('active-mic');
        }

        // --- SISTEMA INTERPRETE DE TEXTO Y BLOQUES DE CÓDIGO MARKDOWN ---
        function escribirEnTerminal(texto, tipoClase) {
            const entradaLog = document.createElement('div');
            entradaLog.className = `log-entry ${tipoClase}`;
            terminal.appendChild(entradaLog);
            
            // Analizador Regex para aislar bloques de código encerrados entre triples comillas (```)
            const regexBloqueCodigo = /```(?:[a-zA-Z]+)?\n([\s\S]*?)```/g;
            let indicesCodigo = [];
            let coincidencia;
            
            // Almacenamos los bloques de código detectados
            while ((coincidencia = regexBloqueCodigo.exec(texto)) !== null) {
                indicesCodigo.push({
                    inicio: coincidencia.index,
                    fin: coincidencia.index + coincidencia[0].length,
                    contenido: coincidencia[1]
                });
            }
            
            let i = 0;
            const velocidad = 8; // Renderizado ultra veloz para cadenas largas
            
            function teclear() {
                if (i < texto.length) {
                    // Validamos si la posición actual cruza un bloque de código
                    let bloqueEncontrado = indicesCodigo.find(b => i >= b.inicio && i < b.fin);
                    
                    if (bloqueEncontrado) {
                        // Insertamos el bloque estructurado completo de una vez
                        const preContenedor = document.createElement('pre');
                        preContenedor.className = 'code-block-hud';
                        preContenedor.textContent = bloqueEncontrado.contenido.trim();
                        entradaLog.appendChild(preContenedor);
                        
                        i = bloqueEncontrado.fin; // Saltamos el cursor al final del bloque
                    } else {
                        // Impresión normal caracter por caracter
                        entradaLog.innerHTML += texto.charAt(i);
                        i++;
                    }
                    terminal.scrollTop = terminal.scrollHeight;
                    setTimeout(teclear, velocidad);
                }
            }
            teclear();
        }

        // --- EMISIÓN DE AUDIO NÚCLEO (INTEGRADO CON EL MÓDULO VOCAL CONTINUO) ---
        function emitirAudioNucleo(url) {
            // Pausamos el micrófono para evitar que capte su propio parlante
            if (reconocimientoVoz && controlVozActivo) {
                reconocimientoVoz.stop();
            }

            const streamingAudio = new Audio(`${url}?t=${new Date().getTime()}`);
            
            streamingAudio.onplay = () => { 
                reactor.classList.add('core-speaking'); 
                activarOsciloscopio(true);
            };
            
            streamingAudio.onended = () => { 
                reactor.classList.remove('core-speaking'); 
                activarOsciloscopio(false);
                // Reactivamos el bucle de escucha activa si continúa encendido
                if (controlVozActivo) {
                    encenderCapturaVocal();
                }
            };

            streamingAudio.play().catch(err => {
                logSistema("Salida de audio restringida. Presione 'AUTORIZAR AUDIO'.");
                reactor.classList.remove('core-speaking');
                activarOsciloscopio(false);
                if (controlVozActivo) encenderCapturaVocal();
            });
        }

        // --- OSCILOSCOPIO DE TELEMETRÍA DINÁMICA ---
        function inicializarOsciloscopio() {
            const ctx = document.getElementById('oscillo-canvas').getContext('2d');
            const dataInicial = Array(20).fill(0);
            
            oscilloChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(20).fill(''),
                    datasets: [{
                        data: dataInicial,
                        borderColor: '#00f2fe',
                        borderWidth: 2,
                        pointRadius: 0,
                        fill: false,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { min: -10, max: 10, display: false }
                    }
                }
            });

            // Actualización cíclica en segundo plano
            setInterval(() => {
                let datosActuales = oscilloChart.data.datasets[0].data;
                datosActuales.shift();
                
                // Si Tercero habla o escucha, generamos ondas pronunciadas, si no, ruido eléctrico base
                let amplitud = reactor.classList.contains('core-speaking') ? 8 : 
                               reactor.classList.contains('core-listening') ? 5 : 1;
                
                let nuevaMuestra = (Math.random() - 0.5) * amplitud;
                datosActuales.push(nuevaMuestra);
                oscilloChart.update('none');
            }, 100);
        }

        function activarOsciloscopio(activo) {
            if(!oscilloChart) return;
            oscilloChart.options.scales.y.max = activo ? 12 : 10;
            oscilloChart.options.scales.y.min = activo ? -12 : -10;
        }

        // --- TELEMETRÍA SECUNDARIA (RELOJ, BATERÍA Y PING) ---
        function actualizarRelojHUD() {
            const ahora = new Date();
            const hrs = String(ahora.getHours()).padStart(2, '0');
            const mins = String(ahora.getMinutes()).padStart(2, '0');
            const secs = String(ahora.getSeconds()).padStart(2, '0');
            document.getElementById('telemetry-clock').innerText = `${hrs}:${mins}:${secs}`;
        }
        setInterval(actualizarRelojHUD, 1000);

        async function inicializarTelemetriaBateria() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    const cambiarMetricas = () => {
                        const nivel = Math.round(battery.level * 100);
                        const estadoCarga = battery.charging ? " [CHARGING]" : "";
                        document.getElementById('telemetry-battery').innerText = `${nivel}%${estadoCarga}`;
                        const fillBar = document.getElementById('bar-battery');
                        fillBar.style.width = `${nivel}%`;
                        fillBar.style.backgroundColor = (nivel <= 20 && !battery.charging) ? "#ff0055" : "var(--neon-cyan)";
                    };
                    cambiarMetricas();
                    battery.addEventListener('levelchange', cambiarMetricas);
                    battery.addEventListener('chargingchange', cambiarMetricas);
                } catch (e) {
                    document.getElementById('telemetry-battery').innerText = "OFFLINE";
                }
            } else {
                document.getElementById('telemetry-battery').innerText = "NOT SUPPORTED";
            }
        }

        async function calcularLatenciaRed() {
            const inicio = Date.now();
            try {
                await fetch('/chat', { method: 'OPTIONS' }).catch(() => {});
                const latencia = Date.now() - inicio;
                document.getElementById('telemetry-ping').innerText = `${latencia} ms`;
                const fillBar = document.getElementById('bar-ping');
                fillBar.style.width = `${Math.max(10, Math.min(100, 100 - (latencia / 5)))}%`;
                fillBar.style.backgroundColor = latencia > 500 ? "#ff0055" : latencia > 250 ? "#ffaa00" : "var(--neon-cyan)";
            } catch (err) {
                document.getElementById('telemetry-ping').innerText = "ERR ms";
                document.getElementById('bar-ping').style.width = '0%';
            }
        }
        setInterval(calcularLatenciaRed, 5000);

        // --- ENVIAR MENSAJES Y TRANSMISIÓN DE DATOS ---
        async function enviarMensajeConsola() {
            const msg = cmdInput.value.trim();
            if (!msg) return;

            cmdInput.value = '';
            terminal.innerHTML += `<div class="log-entry user-cmd">> Ennio: ${msg}</div>`;
            irAlFondo();

            try {
                const respuesta = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: "Ennio", message: msg})
                });
                
                const datos = await respuesta.json();
                escribirEnTerminal(`[TERCERO]: ${datos.text}`, 'tercero-resp');

                if (datos.audio_url) {
                    emitirAudioNucleo(datos.audio_url);
                }
            } catch (err) {
                logSistema("Error crítico en transmisión de paquete.");
            }
        }

        async function procesarCargaArchivo() {
            const cargador = document.getElementById('matrix-file-loader');
            if (cargador.files.length === 0) return;

            const archivo = cargador.files[0];
            logSistema(`Inyectando archivo en la matriz: ${archivo.name}...`);

            const formData = new FormData();
            formData.append("user_id", "Ennio");
            formData.append("file", archivo);

            try {
                const respuesta = await fetch('/upload', { method: 'POST', body: formData });
                const datos = await respuesta.json();
                
                logSistema(`Transmisión completa de ${archivo.name}.`);
                escribirEnTerminal(`[TERCERO]: ${datos.text}`, 'tercero-resp');

                if (datos.audio_url) {
                    emitirAudioNucleo(datos.audio_url);
                }
            } catch (err) {
                logSistema("Fallo en la carga de archivo binario.");
            }
        }

        function sincronizarCanalAudio() {
            window.AudioContext = window.AudioContext || window.webkitAudioContext;
            new AudioContext();
            logSistema("Canal de salida de audio sincronizado.");
        }

        function logSistema(texto) {
            terminal.innerHTML += `<div class="log-entry system-alert">> [SISTEMA]: ${texto}</div>`;
            irAlFondo();
        }

        function evaluarRetorno(e) {
            if (e.key === 'Enter') enviarMensajeConsola();
        }

        function irAlFondo() { terminal.scrollTop = terminal.scrollHeight; }

        // Inicialización de submódulos al cargar el árbol DOM
        window.onload = () => {
            inicializarOsciloscopio();
            inicializarTelemetriaBateria();
            calcularLatenciaRed();
        };
    </script>
</body>
</html>
