<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tercero OS | Mainframe</title>
    <style>
        :root { --neon: #00f2fe; --bg: #060913; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 300px; border-right: 1px solid var(--neon); padding: 20px; }
        #chat-area { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        #terminal { flex: 1; border: 1px solid var(--neon); padding: 15px; overflow-y: auto; margin-bottom: 10px; }
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 10px; width: 70%; }
        button { background: var(--neon); color: black; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>TELEMETRÍA</h3>
        <div id="status">STATUS: ONLINE</div>
    </div>
    <div id="chat-area">
        <h1>TERCERO OS v3.0</h1>
        <div id="terminal"></div>
        <div>
            <input type="text" id="msg" placeholder="Comando de sistema...">
            <button onclick="ejecutar()">EJECUTAR</button>
        </div>
    </div>
    <script>
        async function ejecutar() {
            const m = document.getElementById('msg').value;
            const term = document.getElementById('terminal');
            term.innerHTML += `<p>> ${m}</p>`;
            
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: "Ennio", message: m})
            });
            const data = await res.json();
            term.innerHTML += `<p style="color: #fff">Tercero: ${data.text}</p>`;
            
            // Si hay audio, reproducirlo
            if(data.audio_url) {
                new Audio(data.audio_url).play();
            }
            document.getElementById('msg').value = '';
        }
    </script>
</body>
</html>
