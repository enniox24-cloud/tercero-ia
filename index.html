<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TERCERO OS | MAINFRAME</title>
    <style>
        body { background: #000; color: #00f2fe; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        #terminal { height: 70vh; overflow-y: auto; border: 1px solid #00f2fe; padding: 15px; margin-bottom: 10px; }
        .input-area { display: flex; gap: 10px; }
        button { background: #00f2fe; color: #000; padding: 10px; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div id="terminal">--- SISTEMA TERCERO OS: MODO DIAGNÓSTICO ---<br></div>
    <div class="input-area">
        <button onclick="activarMicro()">🎤 MIC</button>
        <input type="text" id="msg" placeholder="Comando...">
        <button onclick="ejecutar()">EJECUTAR</button>
        <input type="file" id="fileInput" onchange="subirArchivo()">
    </div>
    <script>
        // 1. Diagnóstico de Audio
        function reproducirAudio(url) {
            const audio = new Audio(url);
            audio.play().catch(e => {
                document.getElementById('terminal').innerHTML += `<p style="color:red">> ERROR AUDIO: ${e.message}</p>`;
            });
        }

        // 2. Micrófono mejorado
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'es-ES';
        function activarMicro() { 
            rec.start();
            document.getElementById('terminal').innerHTML += "<p>> Micrófono escuchando...</p>";
        }
        rec.onresult = (e) => { 
            const texto = e.results[0][0].transcript;
            document.getElementById('msg').value = texto;
            ejecutar();
        };

        // 3. Ejecución con manejo de errores
        async function ejecutar() {
            const m = document.getElementById('msg').value;
            const res = await fetch('/chat', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({user_id: "Ennio", message: m}) 
            });
            const data = await res.json();
            document.getElementById('terminal').innerHTML += `<p>> [Tercero]: ${data.text}</p>`;
            if(data.audio_url) reproducirAudio(data.audio_url);
        }

        // 4. Subida de archivos
        async function subirArchivo() {
            const file = document.getElementById('fileInput').files[0];
            const formData = new FormData();
            formData.append("user_id", "Ennio");
            formData.append("file", file);
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            document.getElementById('terminal').innerHTML += `<p>> Archivo cargado: ${data.filename}</p>`;
        }
    </script>
</body>
</html>
